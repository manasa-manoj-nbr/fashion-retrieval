# ---------------------------------------------------------------------------
# Central configuration. All tunable knobs live here so that logic stays
# separate from data / hyper-parameters (graded: "is logic separated from data").
# ---------------------------------------------------------------------------

models:
  # Fashion-tuned CLIP. Beats vanilla CLIP on garment/fabric/style vocabulary.
  clip: "patrickjohncyh/fashion-clip"
  # Human-parsing segmenter used to localise garments (upper / lower / etc.).
  segmenter: "mattmdjaga/segformer_b2_clothes"
  # Local VQA model used for the attribute-verification re-rank stage.
  # Runs on the Colab T4 -> no API key required, fully self-contained.
  vqa: "Salesforce/blip-vqa-base"

paths:
  data_dir: "data/images"
  eval_file: "data/eval/queries.json"
  index_dir: "index"

index:
  # Chroma collections (one store, multi-vector: global scene + garment regions).
  global_collection: "global_emb"
  region_collection: "region_emb"
  distance: "cosine"
  # Ignore tiny garment masks (noise). Fraction of image area.
  min_region_area_frac: 0.01

retrieval:
  candidate_pool: 200      # Stage-1 recall breadth (global-vector ANN)
  rerank_top_n: 20         # how many candidates the VQA re-ranker inspects
  top_k: 5                 # final results returned
  # Score-fusion weights: composition (attribute binding) is weighted highest
  # because it is the component that fixes CLIP's failure mode.
  weights:
    composition: 0.5
    scene: 0.3
    global: 0.2

# Maps free-text garment words -> segmenter region classes. This is the bridge
# between a natural-language query and the coarse human-parsing labels.
garment_map:
  upper: [shirt, t-shirt, tshirt, tee, blouse, top, hoodie, sweater, jumper,
          blazer, jacket, coat, raincoat, outerwear, button-down, button-up,
          tie, suit, cardigan, vest]
  lower: [pants, trousers, jeans, shorts, skirt, leggings, chinos]
  dress: [dress, gown, frock]
  hat: [hat, cap, beanie]
  scarf: [scarf, shawl]
  bag: [bag, handbag, backpack, purse]
  shoes: [shoes, sneakers, boots, heels, footwear]

# Named colour anchors (RGB) for the cheap dominant-colour descriptor.
colors:
  red: [220, 20, 20]
  orange: [230, 120, 20]
  yellow: [235, 215, 40]
  green: [30, 160, 60]
  blue: [30, 70, 200]
  purple: [120, 40, 160]
  pink: [230, 130, 180]
  brown: [110, 70, 40]
  black: [20, 20, 20]
  white: [240, 240, 240]
  gray: [128, 128, 128]
  beige: [220, 200, 160]
